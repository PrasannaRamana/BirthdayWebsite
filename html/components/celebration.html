<!-- MODULE: CELEBRATION SCREEN -->
<section class="screen" id="screen-celebration" data-screen="celebration" hidden>
  <canvas class="fx-canvas" id="celebrationFxCanvas" aria-hidden="true"></canvas>
  <div class="celebration-stage">
    <p class="eyebrow">It's the day.</p>
    <h2 class="screen-title gradient-title">Happy Birthday, Bhavana <span aria-hidden="true">❤</span></h2>
    <p class="screen-sub">Fireworks, confetti and a quiet promise – all for you.</p>
    <div class="celebration-actions">
      <button class="btn-luxe" id="btnFire"><span class="btn-luxe__inner">Light the sky</span></button>
      <button class="btn-ghost" data-next>Open your letters →</button>
    </div>
  </div>
</section>
