<!-- MODULE: MODALS & POPUPS -->

<!-- Candle Popup Modal -->
<div class="candle-popup" id="candlePopup" hidden>
  <div class="candle-popup__card" role="dialog" aria-modal="true" aria-labelledby="candlePopupTitle">
    <div class="candle-popup__sparkle" aria-hidden="true">✨</div>
    <h3 id="candlePopupTitle" class="candle-popup__title">Make a wish, Bhavana!</h3>
    <p class="candle-popup__text">Your candles are out — now open a little album of memories made just for you.</p>
    <button class="btn-luxe" id="btnViewGallery"><span class="btn-luxe__inner">📸 View Photo Gallery ❤</span></button>
    <button class="candle-popup__skip" id="candlePopupClose">Maybe later</button>
  </div>
</div>

<!-- Gallery Modal -->
<div class="gallery-modal" id="galleryModal" hidden>
  <div class="gallery-modal__inner" role="dialog" aria-modal="true" aria-labelledby="galleryModalTitle">
    <button class="gallery-modal__close" id="galleryModalClose" aria-label="Close gallery">×</button>
    <h3 id="galleryModalTitle" class="gallery-modal__title">Our memories ❤</h3>
    <div class="final-gallery" id="finalGallery"></div>
  </div>
</div>

<!-- Letter Modal -->
<div class="letter-modal" id="letterModal" hidden>
  <div class="letter-modal__paper" role="dialog" aria-modal="true" aria-labelledby="letterTitle">
    <button class="letter-modal__close" id="letterClose" aria-label="Close letter">×</button>
    <p class="letter-modal__eyebrow">A letter for Bhavana</p>
    <h3 id="letterTitle" class="letter-modal__title">·</h3>
    <p id="letterBody" class="letter-modal__body">·</p>
    <p class="letter-modal__sign">— Yours, always</p>
  </div>
</div>
