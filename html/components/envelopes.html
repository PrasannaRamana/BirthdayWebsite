<!-- MODULE: ENVELOPES SCREEN -->
<section class="screen" id="screen-envelopes" data-screen="envelopes" hidden>
  <div class="section-head">
    <p class="eyebrow">Eight letters · written quietly</p>
    <h2 class="screen-title">Open them, one by one</h2>
    <div class="progress-chip"><span id="envProgress">0</span> / 8 opened</div>
  </div>
  <div class="envelopes-stage" id="envelopesStage"></div>
  <div class="section-foot">
    <button class="btn-ghost" id="btnEnvelopesNext" data-next disabled>Continue →</button>
  </div>
</section>
