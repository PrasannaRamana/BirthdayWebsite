<!-- MODULE: LANDING SCREEN -->
<section class="screen" id="screen-landing" data-screen="landing" hidden>
  <div class="landing-stage" data-parallax-root>
    <div class="landing-glow" aria-hidden="true"></div>
    <p class="eyebrow" data-parallax="6">A surprise written only for you</p>
    <h1 class="landing-title" data-parallax="14">
      Happy Birthday<br />
      <span class="landing-name">Bhavana</span>
      <span class="landing-heart" aria-hidden="true">❤</span>
    </h1>
    <p class="landing-sub" data-parallax="4">I created something special only for you. Walk with me through it.</p>
    <button class="btn-luxe" id="btnBeginJourney">
      <span class="btn-luxe__inner">Begin the Journey</span>
      <span class="btn-luxe__shine" aria-hidden="true"></span>
    </button>
    <div class="landing-floaters" aria-hidden="true"></div>
  </div>
</section>
