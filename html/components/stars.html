<!-- MODULE: STARS SCREEN -->
<section class="screen" id="screen-stars" data-screen="stars" hidden>
  <div class="section-head">
    <p class="eyebrow">A sky of secrets</p>
    <h2 class="screen-title">Catch the stars</h2>
    <p class="screen-sub">Tap each glowing star to hear what it whispers.</p>
    <div class="progress-chip"><span id="starProgress">0</span> / <span id="starTotal">12</span> collected</div>
  </div>
  <div class="stars-stage" id="starsStage"></div>
  <div class="star-whisper" id="starWhisper" hidden></div>
  <div class="section-foot">
    <button class="btn-ghost" id="btnStarsNext" data-next disabled>15 reasons →</button>
  </div>
</section>
