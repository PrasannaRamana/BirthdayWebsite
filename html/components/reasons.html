<!-- MODULE: REASONS SCREEN -->
<section class="screen" id="screen-reasons" data-screen="reasons" hidden>
  <div class="section-head">
    <p class="eyebrow">15 reasons</p>
    <h2 class="screen-title">Why you're amazing</h2>
    <p class="screen-sub">Press the card. A new reason every time, without repeats.</p>
  </div>
  <div class="reasons-stage">
    <div class="reason-card" id="reasonCard">
      <span class="reason-card__num" id="reasonNum">·</span>
      <p class="reason-card__text" id="reasonText">Press to reveal the first reason.</p>
    </div>
    <button class="btn-luxe" id="btnNextReason"><span class="btn-luxe__inner">Reveal a reason</span></button>
    <p class="reasons-meta" id="reasonsMeta">0 / 15 revealed</p>
  </div>
  <div class="section-foot">
    <button class="btn-ghost" data-next>Play a little game →</button>
  </div>
</section>
