<!-- MODULE: PASSWORD/VERIFICATION SCREEN -->
<section class="screen" id="screen-password" data-screen="password" hidden>
  <div class="password-stage">
    <p class="eyebrow">One more step</p>
    <h2 class="screen-title">Verify your entry</h2>
    <p class="password-sub">Enter her birthday to continue the journey</p>
    
    <div class="password-form">
      <div class="password-input-group">
        <input 
          type="password" 
          id="passwordInput" 
          class="password-input" 
          placeholder="DD-MM-YYYY"
          maxlength="10"
          aria-label="Password: Enter birthday in DD-MM-YYYY format"
        />
        <button type="button" id="togglePasswordVisibility" class="password-toggle" aria-label="Toggle password visibility">
          <span class="toggle-icon">👁️</span>
        </button>
      </div>
      
      <div id="passwordError" class="password-error" hidden></div>
      
      <button type="button" id="btnSubmitPassword" class="btn-luxe">
        <span class="btn-luxe__inner">Enter</span>
      </button>
      
      <p class="password-hint">Hint: DD-MM-YYYY format (e.g., 02-07-2026)</p>
    </div>
  </div>
</section>
