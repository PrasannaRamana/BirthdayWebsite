<!-- MODULE: COUNTDOWN SCREEN -->
<section class="screen" id="screen-countdown" data-screen="countdown" hidden>
  <div class="countdown-stage">
    <p class="eyebrow">Counting the moments until</p>
    <h2 class="screen-title">Your day arrives</h2>
    <div class="countdown-grid" id="countdownGrid">
      <div class="cd-cell">
        <div class="cd-num" data-cd="days">000</div>
        <div class="cd-label">Days</div>
      </div>
      <div class="cd-cell">
        <div class="cd-num" data-cd="hours">00</div>
        <div class="cd-label">Hours</div>
      </div>
      <div class="cd-cell">
        <div class="cd-num" data-cd="minutes">00</div>
        <div class="cd-label">Minutes</div>
      </div>
      <div class="cd-cell">
        <div class="cd-num" data-cd="seconds">00</div>
        <div class="cd-label">Seconds</div>
      </div>
    </div>
    <p class="countdown-meta" id="countdownMeta">02 July 2026 · A day the world celebrates you.</p>
    <button class="btn-ghost" id="btnCountdownNext" data-next disabled>Continue the journey →</button>
  </div>
</section>
